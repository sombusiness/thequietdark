<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quiet Dark | True Horror Stories</title>
    <meta name="description" content="True horror stories from the dark. Real experiences. Real fear. New nightmares every week.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Background Room */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://sombusiness.github.io/thequietdark/dark_room_vignette.png');
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: fadeInBg 2s ease-in 0.5s forwards;
            z-index: 1;
        }

        /* Container for all content */
        .main-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Logo - Center Stage (Initial) */
        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 80%;
            z-index: 10;
            opacity: 0;
            animation: 
                fadeInLogo 2s ease-in 2.5s forwards,
                fadeOutLogo 1.5s ease-out 5.5s forwards;
        }

        .logo-center img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.6));
        }

        /* TV Container */
        .tv-container {
            position: absolute;
            width: 600px;
            max-width: 70%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            opacity: 0;
            animation: fadeIn 2s ease-in 7s forwards;
        }

        /* YouTube iframe wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 80%;
            border: none;
        }

        /* TV Frame Overlay */
        .tv-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://sombusiness.github.io/thequietdark/tv_frame.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 5;
        }

        /* Logo - Small (Right Side) */
        .logo-small {
            position: fixed;
            right: 8%;
            top: 15%;
            width: 200px;
            max-width: 25%;
            z-index: 4;
            opacity: 0;
            animation: fadeIn 2s ease-in 9s forwards;
        }

        .logo-small img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
        }

        /* Hooded Mascot - Left Side */
        .mascot {
            position: fixed;
            left: 5%;
            bottom: 5%;
            width: 350px;
            max-width: 30%;
            z-index: 4;
            opacity: 0;
            transform: translateX(-150px);
            animation: slideInMascot 2.5s ease-out 9s forwards;
        }

        .mascot img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.2));
        }

        /* CTA Section - Bottom */
        .cta-section {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 4;
            opacity: 0;
            animation: fadeIn 2s ease-in 11s forwards;
        }

        .trailer-text {
            font-size: 1.3rem;
            font-style: italic;
            color: #ccc;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transform: scale(1.05);
        }

        .btn-primary {
            border-color: #ff0000;
            color: #ff0000;
        }

        /* Animations */
        @keyframes fadeInBg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInLogo {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes fadeOutLogo {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInMascot {
            from { 
                opacity: 0;
                transform: translateX(-150px);
            }
            to { 
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .logo-center {
                width: 400px;
            }

            .tv-container {
                width: 500px;
            }

            .logo-small {
                width: 180px;
                right: 5%;
                top: 12%;
            }

            .mascot {
                width: 280px;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
            }

            .main-container {
                height: auto;
                min-height: 100vh;
                padding: 2rem 0;
            }

            .logo-center {
                width: 300px;
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                margin: 2rem auto;
            }

            .tv-container {
                position: relative;
                width: 90%;
                top: auto;
                left: auto;
                transform: none;
                margin: 2rem auto;
            }

            .logo-small {
                position: relative;
                width: 200px;
                right: auto;
                top: auto;
                margin: 2rem auto;
            }

            .mascot {
                display: none;
            }

            .cta-section {
                position: relative;
                bottom: auto;
                left: auto;
                transform: none;
                margin: 2rem auto;
                padding-bottom: 2rem;
            }

            .trailer-text {
                font-size: 1.1rem;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .logo-center {
                width: 250px;
            }

            .tv-container {
                width: 95%;
            }

            .logo-small {
                width: 160px;
            }

            .trailer-text {
                font-size: 1rem;
            }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Room -->
    <div class="background"></div>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Logo - Center Stage (Appears then fades out) -->
        <div class="logo-center">
            <img src="The-Quiet-Dark-logo-2026-no-bg.png" alt="The Quiet Dark">
        </div>

        <!-- TV Container with Video (Appears after logo fades) -->
        <div class="tv-container">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/T9Q56GS91kk" 
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
                <div class="tv-frame"></div>
            </div>
        </div>

        <!-- Logo - Small (Right side, appears with mascot) -->
        <div class="logo-small">
            <img src="The-Quiet-Dark-logo-2026-no-bg.png" alt="The Quiet Dark">
        </div>

        <!-- Hooded Mascot - Left side -->
        <div class="mascot">
            <img src="yt-profile.jpg" alt="The Quiet Dark Mascot">
        </div>

        <!-- CTA Section - Bottom -->
        <div class="cta-section">
            <p class="trailer-text">Watch the trailer... if you dare...</p>
            <div class="cta-buttons">
                <a href="https://www.youtube.com/@quietdarkstories" target="_blank" class="btn btn-primary">
                    Watch on YouTube
                </a>
                <a href="mailto:submit@quietdarkstories.com" class="btn">
                    Submit Your Story
                </a>
            </div>
        </div>

    </div>

</body>
</html>
