<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quiet Dark | True Horror Stories</title>
    <meta name="description" content="True horror stories from the dark. Real experiences. Real fear. New nightmares every week.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Background Room */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('dark_room_vignette.png');
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: fadeInBg 2s ease-in 0.5s forwards;
            z-index: 1;
        }

        /* Container for all content */
        .main-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Logo - Center Stage (Initial) */
        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 80%;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            animation:
                fadeInLogoSimple 2s ease-in 2.5s forwards,
                fadeOutLogo 1.5s ease-out 7.5s forwards;
        }

        .logo-center img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.6));
        }

        /* TV Container */
        .tv-container {
            position: absolute;
            width: 650px;
            max-width: 75%;
            top: 44%;              /* slightly higher to make room for CTAs */
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            opacity: 0;
            animation: fadeIn 2s ease-in 9s forwards;
        }

        /* YouTube iframe wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            /* aspect ratio tuned to tv_frame.png */
            padding-bottom: 58%;
            overflow: visible;     /* let the TV img extend beyond if needed */
        }

        /* YouTube iframe: fills the glass area */
        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            border: none;
        }

        /* TV frame as an <img> OVER the iframe */
        .video-wrapper .tv-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 118%;
            height: 131%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }

        /* Logo - Small (Right Side) */
        .logo-small {
            position: fixed;
            right: 8%;
            top: 15%;
            width: 200px;
            max-width: 25%;
            z-index: 4;
            opacity: 0;
            animation: fadeIn 2s ease-in 11s forwards;
        }

        .logo-small img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
        }

        /* Hooded Mascot - Left Side */
        .mascot {
            position: fixed;
            left: 5%;
            bottom: 0%;
            width: 260px;
            max-width: 22%;
            z-index: 4;
            opacity: 0;
            transform: translateX(-150px);
            animation: slideInMascot 2.5s ease-out 11s forwards;
        }

        .mascot img {
            width: 100%;
            height: auto;
            opacity: 0.5;
        }

        /* CTA Section - Bottom */
        .cta-section {
            position: fixed;
            bottom: 12%;            /* a bit lower for breathing room */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 4;
            opacity: 0;
            animation: fadeIn 2s ease-in 13s forwards;
        }

        .trailer-text {
            font-size: 1.3rem;
            font-style: italic;
            color: #ccc;
            margin-bottom: 1.3rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            transform: scale(1.05);
        }

        .btn-primary {
            border-color: #ff0000;
            color: #ff0000;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 0.75rem;
            color: #666;
            z-index: 4;
            opacity: 0;
            animation: fadeIn 2s ease-in 13s forwards;
        }

        footer a {
            color: #999;
            text-decoration: none;
            margin: 0 0.5rem;
        }

        footer a:hover {
            color: #fff;
        }

        /* Animations */
        @keyframes fadeInBg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInLogoSimple {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOutLogo {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInMascot {
            from {
                opacity: 0;
                transform: translateX(-150px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* TABLET - Landscape (1024px and below) */
        @media (max-width: 1024px) and (min-width: 769px) {
            .logo-center {
                width: 400px;
            }

            .tv-container {
                width: 520px;
                top: 46%;
            }

            .logo-small {
                width: 160px;
                right: 5%;
                top: 10%;
            }

            .mascot {
                width: 230px;
                left: 3%;
            }

            .cta-section {
                bottom: 6%;
            }

            .trailer-text {
                font-size: 1.1rem;
            }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        /* TABLET - Portrait & Mobile Landscape (768px and below) */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
            }

            .main-container {
                height: auto;
                min-height: 100vh;
                flex-direction: column;
                padding: 3rem 1rem;
            }

            .logo-center {
                width: 320px;
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                margin: 2rem auto 3rem;
                animation: fadeInLogoSimple 1.5s ease-in 0.5s forwards;
            }

            .tv-container {
                position: relative;
                width: 100%;
                max-width: 500px;
                top: auto;
                left: auto;
                transform: none;
                margin: 0 auto 2rem;
                animation: fadeIn 1.5s ease-in 1.5s forwards;
            }

            .logo-small {
                position: relative;
                width: 220px;
                right: auto;
                top: auto;
                margin: 2rem auto;
                animation: fadeIn 1.5s ease-in 2.5s forwards;
            }

            .mascot {
                display: none;
            }

            .cta-section {
                position: relative;
                bottom: auto;
                left: auto;
                transform: none;
                margin: 2rem auto;
                animation: fadeIn 1.5s ease-in 2.5s forwards;
            }

            .trailer-text {
                font-size: 1.2rem;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 1rem;
                max-width: 300px;
                margin: 0 auto;
            }

            footer {
                position: relative;
                bottom: auto;
                left: auto;
                transform: none;
                margin: 2rem auto;
                padding-bottom: 2rem;
                animation: fadeIn 1.5s ease-in 2.5s forwards;
            }
        }

        /* MOBILE - Small (480px and below) */
        @media (max-width: 480px) {
            .main-container {
                padding: 2rem 0.5rem;
            }

            .logo-center {
                width: 260px;
                margin: 1.5rem auto 2.5rem;
            }

            .tv-container {
                width: 95%;
            }

            .logo-small {
                width: 180px;
            }

            .trailer-text {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.85rem;
            }

            footer {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Room -->
    <div class="background"></div>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Logo - Center Stage (Appears then fades out on desktop) -->
        <div class="logo-center" id="logoCenter">
            <img src="The-Quiet-Dark-logo-2026-no-bg.png" alt="The Quiet Dark">
        </div>

        <!-- TV Container with Video -->
        <div class="tv-container">
            <div class="video-wrapper">
                <iframe
                    src="https://www.youtube.com/embed/T9Q56GS91kk"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>

                <!-- TV frame overlay -->
                <img src="tv_frame.png" alt="" class="tv-frame">
            </div>
        </div>

        <!-- Logo - Small (Right side, appears with mascot) -->
        <div class="logo-small">
            <img src="The-Quiet-Dark-logo-2026-no-bg.png" alt="The Quiet Dark">
        </div>

        <!-- Hooded Mascot - Left side -->
        <div class="mascot">
            <img src="mascot.png" alt="The Quiet Dark Mascot">
        </div>

        <!-- CTA Section - Bottom -->
        <div class="cta-section">
            <p class="trailer-text">Watch the trailer... if you dare...</p>
            <div class="cta-buttons">
                <a href="https://www.youtube.com/@quietdarkstories" target="_blank" class="btn btn-primary">
                    Watch on YouTube
                </a>
                <a href="mailto:submit@quietdarkstories.com" class="btn">
                    Submit Your Story
                </a>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Quiet Dark Stories. All Rights Reserved.</p>
        <p style="margin-top: 0.3rem;">
            <a href="https://www.youtube.com/@quietdarkstories" target="_blank">YouTube</a>
        </p>
    </footer>

    <!-- Remove big logo after its fade-out animation finishes -->
    <script>
        const logoCenter = document.getElementById('logoCenter');

        if (logoCenter) {
            logoCenter.addEventListener('animationend', function (e) {
                if (e.animationName === 'fadeOutLogo') {
                    logoCenter.parentNode.removeChild(logoCenter);
                }
            });
        }
    </script>

</body>
</html>
